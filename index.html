<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhujbal Bandhu Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons for elegant scalable icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Classy Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Mukta:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            light: '#fcfaf8',
                            dark: '#4a1515', // Deep Burgundy
                            accent: '#b4813f', // Muted Gold
                            muted: '#8c7e73'
                        }
                    },
                    fontFamily: {
                        heading: ['"Playfair Display"', 'serif'],
                        body: ['"Lora"', 'serif'],
                        marathi: ['"Mukta"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #fcfaf8; }
        .font-mr { font-family: 'Mukta', sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        
        /* Hide scrollbar for category menu but keep functionality */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-stone-800 font-body antialiased">

    <!-- Mobile App Container -->
    <div class="max-w-md mx-auto min-h-screen bg-white shadow-2xl relative pb-12">
        
        <!-- Header Section -->
        <header class="sticky top-0 z-50 bg-white/95 backdrop-blur-sm border-b border-stone-100 shadow-sm pt-6 pb-4 px-5">
            <div class="flex justify-between items-center mb-5">
                <div>
                    <h1 class="text-3xl font-heading font-bold text-brand-dark tracking-tight leading-none">
                        Bhujbal Bandhu
                    </h1>
                    <span class="text-xs uppercase tracking-widest text-brand-accent font-semibold ml-1">Pvt. Ltd.</span>
                </div>
                <button id="langToggle" class="flex items-center gap-1 border border-brand-dark text-brand-dark px-3 py-1.5 rounded-full text-xs font-semibold hover:bg-brand-dark hover:text-white transition-colors">
                    <i data-lucide="languages" class="w-3 h-3"></i>
                    <span id="langText">मराठी</span>
                </button>
            </div>
            
            <!-- Search Bar -->
            <div class="relative mb-4">
                <input type="text" id="searchInput" placeholder="Search our menu..." 
                    class="w-full pl-10 pr-4 py-2.5 bg-stone-50 border border-stone-200 rounded-xl focus:ring-1 focus:ring-brand-dark focus:border-brand-dark outline-none text-sm transition-all font-body placeholder:text-stone-400">
                <i data-lucide="search" class="absolute left-3.5 top-3 w-4 h-4 text-stone-400"></i>
            </div>

            <!-- Categories -->
            <div class="flex overflow-x-auto gap-2 scrollbar-hide py-1" id="categoryContainer">
                <!-- Category buttons injected here -->
            </div>
        </header>

        <!-- Menu Content -->
        <main id="menuContainer" class="px-5 mt-6 space-y-8 min-h-[50vh]">
            <!-- Items injected here -->
        </main>

        <!-- Footer / Notes -->
        <footer id="notesContainer" class="mx-5 mt-10 p-5 bg-stone-50 rounded-xl border border-stone-100 flex gap-3 text-sm text-brand-muted italic">
            <!-- Notes injected here -->
        </footer>
    </div>

    <script>
        // Set default to English
        let currentLang = 'en'; 
        let activeCategory = 'All';
        let menuData = [];

        async function loadMenu() {
            try {
                const response = await fetch('menu.json');
                if (!response.ok) {
                    throw new Error(`Failed to fetch menu.json (${response.status})`);
                }

                const data = await response.json();
                menuData = Array.isArray(data) ? data : [];
            } catch (error) {
                console.error('Error loading menu.json:', error);
                const container = document.getElementById('menuContainer');
                container.innerHTML = `
                    <div class="text-center py-10 text-stone-400 fade-in">
                        <i data-lucide="alert-triangle" class="w-10 h-10 mx-auto mb-3 opacity-60"></i>
                        <p class="font-body">Unable to load menu right now.</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            renderCategories();
            renderMenu();
        }

        function renderCategories() {
            const container = document.getElementById('categoryContainer');
            container.innerHTML = '';

            // Extract valid categories (excluding notes)
            const categories = menuData.filter(s => !s.notes).map(s => ({
                mr: s.category,
                en: s.category_en
            }));

            // Add 'All' category at the start
            categories.unshift({ mr: 'सर्व', en: 'All' });

            categories.forEach(cat => {
                const btn = document.createElement('button');
                const label = currentLang === 'en' ? cat.en : cat.mr;
                const isActive = activeCategory === cat.en;
                
                // Add specific font class for Marathi to ensure beautiful rendering
                const fontClass = currentLang === 'mr' ? 'font-mr font-medium' : 'font-body font-medium';
                
                btn.className = `whitespace-nowrap px-4 py-1.5 rounded-full text-sm transition-all duration-300 ${fontClass} ${
                    isActive 
                    ? 'bg-brand-dark text-white shadow-md' 
                    : 'bg-white border border-stone-200 text-stone-600 hover:border-brand-dark hover:text-brand-dark'
                }`;
                btn.innerText = label;
                btn.onclick = () => {
                    activeCategory = cat.en;
                    renderCategories(); // Re-render to update active styling
                    renderMenu(document.getElementById('searchInput').value);
                };
                container.appendChild(btn);
            });
        }

        function renderMenu(searchTerm = '') {
            const container = document.getElementById('menuContainer');
            const notesContainer = document.getElementById('notesContainer');
            container.innerHTML = '';
            notesContainer.innerHTML = '';
            notesContainer.style.display = 'none';

            let itemsFound = false;

            menuData.forEach((section) => {
                // Handle Notes section specifically
                if (section.notes) {
                    notesContainer.style.display = 'flex';
                    const iconWrapper = document.createElement('div');
                    iconWrapper.innerHTML = `<i data-lucide="info" class="w-5 h-5 text-brand-accent mt-0.5"></i>`;
                    notesContainer.appendChild(iconWrapper);
                    
                    const textWrapper = document.createElement('div');
                    section.notes.forEach(n => {
                        const p = document.createElement('p');
                        p.className = `mb-1 ${currentLang === 'mr' ? 'font-mr' : 'font-body'}`;
                        p.innerText = currentLang === 'mr' ? n.note : n.note_en;
                        textWrapper.appendChild(p);
                    });
                    notesContainer.appendChild(textWrapper);
                    return;
                }

                // Filter by Category
                if (activeCategory !== 'All' && section.category_en !== activeCategory) {
                    return;
                }

                // Filter items by Search
                const filteredItems = section.items.filter(item => {
                    const name = (currentLang === 'mr' ? item.dish_name : item.dish_name_en).toLowerCase();
                    const desc = (item.description && item.description_en) ? 
                        (currentLang === 'mr' ? item.description : item.description_en).toLowerCase() : '';
                    const term = searchTerm.toLowerCase();
                    return name.includes(term) || desc.includes(term);
                });

                if (filteredItems.length === 0) return;
                itemsFound = true;

                // Create Section Header
                const sectionDiv = document.createElement('div');
                sectionDiv.className = "fade-in mb-8";
                const secTitle = currentLang === 'mr' ? section.category : section.category_en;
                const fontClassSec = currentLang === 'mr' ? 'font-mr font-semibold' : 'font-heading font-bold';
                
                sectionDiv.innerHTML = `
                    <div class="flex items-center gap-4 mb-5">
                        <h2 class="text-2xl text-brand-dark ${fontClassSec}">${secTitle}</h2>
                        <div class="h-px bg-stone-200 flex-1 mt-2"></div>
                    </div>
                `;

                // Group by Sub-category
                const subCats = [...new Set(filteredItems.map(i => i.sub_category_en))];
                
                subCats.forEach(subEn => {
                    const subItems = filteredItems.filter(i => i.sub_category_en === subEn);
                    const subLabel = currentLang === 'mr' ? subItems[0].sub_category : subEn;
                    const fontClassSub = currentLang === 'mr' ? 'font-mr' : 'font-body uppercase tracking-widest';
                    
                    const subDiv = document.createElement('div');
                    subDiv.className = "mb-6";
                    subDiv.innerHTML = `<h3 class="text-xs ${fontClassSub} font-semibold text-brand-accent mb-3 ml-1">${subLabel}</h3>`;

                    // Render Items
                    subItems.forEach(item => {
                        const priceDisplay = typeof item.price === 'object' 
                            ? `<span class="line-through text-stone-300 text-xs mr-1 font-normal">₹${item.price.old}</span>₹${item.price.current}`
                            : `₹${item.price}`;

                        const itemName = currentLang === 'mr' ? item.dish_name : item.dish_name_en;
                        const itemDesc = currentLang === 'mr' ? item.description : item.description_en;
                        
                        // Show icon only when isVeg is explicitly provided.
                        const hasVegFlag = typeof item.isVeg === 'boolean';
                        const vegIconColor = item.isVeg ? 'text-green-600' : 'text-red-600';
                        const vegIconType = item.isVeg ? 'circle-dot' : 'triangle';
                        const vegIconHtml = hasVegFlag
                            ? `<i data-lucide="${vegIconType}" class="w-3.5 h-3.5 ${vegIconColor}"></i>`
                            : '';
                        
                        const itemHtml = `
                            <div class="flex justify-between items-start mb-3 bg-white p-4 rounded-xl shadow-sm border border-stone-100 hover:shadow-md transition-shadow">
                                <div class="flex-1 pr-4">
                                    <div class="flex items-center gap-2">
                                        ${vegIconHtml}
                                        <h4 class="${currentLang === 'mr' ? 'font-mr font-medium text-lg' : 'font-heading font-semibold text-lg'} text-stone-800 leading-tight">${itemName}</h4>
                                    </div>
                                    ${itemDesc ? `<p class="text-sm text-stone-500 mt-1.5 leading-snug italic ml-5 ${currentLang === 'mr' ? 'font-mr' : 'font-body'}">${itemDesc}</p>` : ''}
                                </div>
                                <div class="font-bold text-brand-dark text-lg whitespace-nowrap mt-0.5">${priceDisplay}</div>
                            </div>
                        `;
                        subDiv.innerHTML += itemHtml;
                    });
                    sectionDiv.appendChild(subDiv);
                });

                container.appendChild(sectionDiv);
            });

            if (!itemsFound && searchTerm !== '') {
                container.innerHTML = `
                    <div class="text-center py-10 text-stone-400 fade-in">
                        <i data-lucide="search-x" class="w-10 h-10 mx-auto mb-3 opacity-50"></i>
                        <p class="${currentLang === 'mr' ? 'font-mr' : 'font-body'}">
                            ${currentLang === 'mr' ? 'काहीही आढळले नाही' : 'No items found'}
                        </p>
                    </div>
                `;
            }

            // Initialize Lucide icons for dynamically added content
            lucide.createIcons();
        }

        // Toggle Language
        document.getElementById('langToggle').addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'mr' : 'en';
            
            // Update Toggle Button Text
            document.getElementById('langText').innerText = currentLang === 'en' ? 'मराठी' : 'English';
            
            // Update Search Placeholder
            const searchInput = document.getElementById('searchInput');
            searchInput.placeholder = currentLang === 'en' ? "Search our menu..." : "पदार्थ शोधा...";
            
            // Re-render
            renderCategories();
            renderMenu(searchInput.value);
        });

        // Search Logic
        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderMenu(e.target.value);
        });

        // Initialize App
        loadMenu();
    </script>
</body>
</html>
