    <script>

        let menuData = [];
        let isMenuLoading = false;

        const AUTO_REFRESH_INTERVAL_MS = 3 * 60 * 1000;

        // Configure this with your published Google Sheet details.
        // Keep sheetId empty to use built-in mock fallback data.
        const GOOGLE_SHEET_CONFIG = {

        // Comprehensive Mock Data as Fallback so the beautiful UI works immediately
        const mockMenuData = [

                    { "dish_name": "व्हेज कोल्हापुरी", "dish_name_en": "Veg Kolhapuri", "description": "तिखट आणि झणझणीत मिश्र भाज्या", "description_en": "Spicy mixed vegetable curry in Kolhapuri style", "price": 260, "sub_category": "शाकाहारी मुख्य", "sub_category_en": "Veg Main", "isVeg": true },
                    { "dish_name": "चिकन हंडी", "dish_name_en": "Chicken Handi", "description": "पारंपारिक मातीच्या भांड्यात शिजवलेले चिकन", "description_en": "Chicken slow-cooked in a traditional clay pot", "price": 380, "sub_category": "मांसाहारी मुख्य", "sub_category_en": "Non-Veg Main", "isVeg": false }
                ]
            },
            {
                "category": "गोड पदार्थ",
                "category_en": "Desserts",
                "items": [
                    { "dish_name": "गुलाब जामुन", "dish_name_en": "Gulab Jamun", "description": "गरमागरम आणि मऊ", "description_en": "Warm and soft dumplings in sugar syrup", "price": 90, "sub_category": "गोड", "sub_category_en": "Sweets", "isVeg": true },
                    { "dish_name": "रबडी जलेबी", "dish_name_en": "Rabdi Jalebi", "description": "मलईदार रबडीसोबत जलेबी", "description_en": "Crispy jalebi served with thick rabdi", "price": 150, "sub_category": "गोड", "sub_category_en": "Sweets", "isVeg": true }
                ]
            },
            {
                "notes": [
                    { "note": "* सर्व किंमती रुपयांमध्ये आहेत.", "note_en": "* All prices are in INR." },
                    { "note": "* जीएसटी अतिरिक्त लागू होईल.", "note_en": "* GST will be applicable extra." }
                ]
            }
        ];

        function normalizeHeaderKey(value) {
            return String(value || '')
                .trim()
                .toLowerCase()
                .replace(/\s+/g, '_')
                .replace(/[^a-z0-9_]/g, '');
        }

        function parseVegFlag(value) {
            if (value === null || value === undefined || value === '') return undefined;
            const normalized = String(value).trim().toLowerCase();
            if (['true', '1', 'yes', 'y', 'veg', 'v'].includes(normalized)) return true;
            if (['false', '0', 'no', 'n', 'non-veg', 'nonveg', 'nv'].includes(normalized)) return false;
            return undefined;
        }

        function parseSheetPrice(row) {
            const oldPrice = row.price_old || row.old_price || row.old;
            const currentPrice = row.price_current || row.current_price || row.current;
            const singlePrice = row.price || row.rate;

            if (oldPrice && currentPrice) {
                return {
                    old: String(oldPrice).trim(),
                    current: String(currentPrice).trim()
                };
            }

            if (singlePrice !== undefined && singlePrice !== null && String(singlePrice).trim() !== '') {
                return String(singlePrice).trim();
            }

            return '';
        }

        function transformSheetRowsToMenu(rows) {
            const sectionsByKey = new Map();
            const notes = [];

            rows.forEach((row) => {
                const noteMr = row.note || '';
                const noteEn = row.note_en || row.noteenglish || '';
                if (noteMr || noteEn) {
                    notes.push({ note: noteMr || noteEn, note_en: noteEn || noteMr });
                    return;
                }

                const categoryMr = row.category || row.section || '';
                const categoryEn = row.category_en || row.categoryenglish || row.section_en || categoryMr;
                const subCategoryMr = row.sub_category || row.subcategory || '';
                const subCategoryEn = row.sub_category_en || row.subcategory_en || row.subcategoryenglish || subCategoryMr;
                const dishMr = row.dish_name || row.item_name || row.item || '';
                const dishEn = row.dish_name_en || row.item_name_en || row.item_en || dishMr;

                if (!categoryEn || !dishEn) return;

                const sectionKey = categoryEn;
                if (!sectionsByKey.has(sectionKey)) {
                    sectionsByKey.set(sectionKey, {
                        category: categoryMr || categoryEn,
                        category_en: categoryEn,
                        items: []
                    });
                }

                sectionsByKey.get(sectionKey).items.push({
                    sub_category: subCategoryMr || subCategoryEn,
                    sub_category_en: subCategoryEn || subCategoryMr,
                    dish_name: dishMr || dishEn,
                    dish_name_en: dishEn || dishMr,
                    description: row.description || '',
                    description_en: row.description_en || row.descriptionenglish || row.description || '',
                    price: parseSheetPrice(row),
                    isVeg: parseVegFlag(row.is_veg ?? row.veg ?? row.veg_flag)
                });
            });

            const result = Array.from(sectionsByKey.values());
            if (notes.length) result.push({ notes });
            return result;
        }

        function parseGoogleVisualizationResponse(text) {
            const start = text.indexOf('{');
            const end = text.lastIndexOf('}');
            if (start === -1 || end === -1) throw new Error('Invalid Google Sheets response format.');
            const jsonText = text.slice(start, end + 1);
            const payload = JSON.parse(jsonText);

            const cols = (payload.table?.cols || []).map((col, idx) => {
                const header = col.label || col.id || `column_${idx + 1}`;
                return normalizeHeaderKey(header);
            });

            const rows = (payload.table?.rows || []).map((row) => {
                const record = {};
                cols.forEach((key, idx) => {
                    const cell = row.c?.[idx];
                    record[key] = cell?.v ?? '';
                });
                return record;
            });

            return transformSheetRowsToMenu(rows);
        }

        async function fetchMenuFromGoogleSheet() {
            if (!GOOGLE_SHEET_CONFIG.sheetId) return null;

            const sheetParam = GOOGLE_SHEET_CONFIG.sheetName
                ? `&sheet=${encodeURIComponent(GOOGLE_SHEET_CONFIG.sheetName)}`
                : '';
            const gidParam = GOOGLE_SHEET_CONFIG.gid ? `&gid=${encodeURIComponent(GOOGLE_SHEET_CONFIG.gid)}` : '';
            const url = `https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_CONFIG.sheetId}/gviz/tq?tqx=out:json${sheetParam}${gidParam}`;

            const response = await fetch(url);
            if (!response.ok) throw new Error('Failed to fetch Google Sheet data.');

            const rawText = await response.text();
            const data = parseGoogleVisualizationResponse(rawText);
            if (!Array.isArray(data) || data.length === 0) {
                throw new Error('Google Sheet returned empty/invalid menu data.');
            }

            return data;
        }

        async function loadMenu(options = {}) {
            const { preserveSearch = true } = options;
            if (isMenuLoading) return;

            isMenuLoading = true;
            try {
                const sheetData = await fetchMenuFromGoogleSheet();
                if (sheetData) {
                    menuData = sheetData;
                } else {
                    menuData = mockMenuData;
                }
            } catch (error) {
                console.warn('Using fallback menu data:', error);
                menuData = mockMenuData;
            } finally {
                isMenuLoading = false;
            }

            renderCategories();
            const currentSearch = preserveSearch ? (document.getElementById('searchInput')?.value || '') : '';
            renderMenu(currentSearch);
        }

        function startAutoRefresh() {
            setInterval(() => {
                // Refresh only when tab is visible to avoid unnecessary requests.
                if (document.visibilityState === 'visible') {
                    loadMenu({ preserveSearch: true });
                }
            }, AUTO_REFRESH_INTERVAL_MS);
        }

        function renderCategories() {
            const container = document.getElementById('categoryContainer');
            container.innerHTML = '';

            const categories = menuData.filter(s => !s.notes).map(s => ({
                mr: s.category,
                en: s.category_en
            }));

            categories.unshift({ mr: 'सर्व', en: 'All' });

            categories.forEach(cat => {
                const btn = document.createElement('button');
                const label = currentLang === 'en' ? cat.en : cat.mr;
                const isActive = activeCategory === cat.en;

                const fontClass = currentLang === 'mr' ? 'font-mr font-semibold text-[15px]' : 'font-heading font-bold text-sm tracking-wide';

                // Redesigned Category Pills - More touch friendly for mobile
                btn.className = `whitespace-nowrap px-6 py-2.5 rounded-full border transition-all duration-300 shadow-sm active:scale-95 ${fontClass} ${isActive
                        ? 'bg-brand-dark text-brand-light border-brand-dark scale-105'
                        : 'bg-white text-stone-500 border-stone-200 hover:border-brand-accent hover:text-brand-dark'
                    }`;
                btn.innerHTML = label;
                btn.onclick = () => {
                    activeCategory = cat.en;
                    renderCategories();
                    renderMenu(document.getElementById('searchInput').value);
                };
                container.appendChild(btn);
            });
        }

        function renderMenu(searchTerm = '') {
            const container = document.getElementById('menuContainer');
            const notesContainer = document.getElementById('notesContainer');
            container.innerHTML = '';
            notesContainer.innerHTML = '';
            notesContainer.classList.add('hidden');

            let itemsFound = false;
            let sectionDelay = 0;

            menuData.forEach((section) => {
                if (section.notes) {
                    notesContainer.classList.remove('hidden');
                    const iconWrapper = document.createElement('div');
                    iconWrapper.innerHTML = `<i data-lucide="info" class="w-5 h-5 text-brand-accent mt-0.5"></i>`;
                    notesContainer.appendChild(iconWrapper);

                    const textWrapper = document.createElement('div');
                    section.notes.forEach(n => {
                        const p = document.createElement('p');
                        p.className = `mb-1 ${currentLang === 'mr' ? 'font-mr' : 'font-body'}`;
                        p.innerText = currentLang === 'mr' ? n.note : n.note_en;
                        textWrapper.appendChild(p);
                    });
                    notesContainer.appendChild(textWrapper);
                    return;
                }

                if (activeCategory !== 'All' && section.category_en !== activeCategory) return;

                const filteredItems = section.items.filter(item => {
                    const name = (currentLang === 'mr' ? item.dish_name : item.dish_name_en).toLowerCase();
                    const desc = (item.description && item.description_en) ?
                        (currentLang === 'mr' ? item.description : item.description_en).toLowerCase() : '';
                    const term = searchTerm.toLowerCase();
                    return name.includes(term) || desc.includes(term);
                });

                if (filteredItems.length === 0) return;
                itemsFound = true;
                sectionDelay += 0.1;

                const sectionDiv = document.createElement('div');
                sectionDiv.className = "fade-in mb-8 sm:mb-10";
                sectionDiv.style.animationDelay = `${sectionDelay}s`;

                const secTitle = currentLang === 'mr' ? section.category : section.category_en;
                const fontClassSec = currentLang === 'mr' ? 'font-mr font-bold text-2xl' : 'font-heading font-bold text-3xl italic';

                sectionDiv.innerHTML = `
                    <div class="text-center mb-6 mt-4 relative">
                        <h2 class="text-brand-dark ${fontClassSec} tracking-tight mb-2 relative z-10 inline-block bg-[#F8F6F0] px-4 break-words">${secTitle}</h2>
                        <div class="absolute top-1/2 left-0 right-0 h-px bg-brand-accent/30 -z-0"></div>
                    </div>
                `;

                const subCats = [...new Set(filteredItems.map(i => i.sub_category_en))];

                subCats.forEach(subEn => {
                    const subItems = filteredItems.filter(i => i.sub_category_en === subEn);
                    const subLabel = currentLang === 'mr' ? subItems[0].sub_category : subEn;
                    const fontClassSub = currentLang === 'mr' ? 'font-mr font-bold text-base' : 'font-heading font-bold uppercase tracking-[0.15em] text-xs';

                    // Card layout for sub-categories - adjusted padding for mobile
                    const subDiv = document.createElement('div');
                    subDiv.className = "mb-6 bg-brand-surface rounded-2xl p-4 sm:p-5 shadow-premium menu-card border border-stone-100";
                    subDiv.innerHTML = `
                        <div class="flex items-center gap-3 mb-5">
                            <div class="h-4 w-1 bg-brand-accent rounded-full shrink-0"></div>
                            <h3 class="${fontClassSub} text-brand-dark/80 break-words">${subLabel}</h3>
                        </div>
                    `;

                    subItems.forEach((item, index) => {
                        const priceDisplay = typeof item.price === 'object'
                            ? `<div class="flex flex-col items-end leading-none"><span class="line-through text-stone-400 text-[10px] mb-0.5 font-normal">₹${item.price.old}</span><span class="text-[1.05rem] sm:text-lg text-brand-dark font-bold">₹${item.price.current}</span></div>`
                            : `<span class="text-[1.05rem] sm:text-lg text-brand-dark font-bold">₹${item.price}</span>`;

                        const itemName = currentLang === 'mr' ? item.dish_name : item.dish_name_en;
                        const itemDesc = currentLang === 'mr' ? item.description : item.description_en;

                        const hasVegFlag = typeof item.isVeg === 'boolean';
                        const vegIconColor = item.isVeg ? 'text-green-600' : 'text-red-600';
                        const borderIconColor = item.isVeg ? 'border-green-600' : 'border-red-600';
                        const vegIconType = item.isVeg ? 'circle-dot' : 'triangle';
                        const vegIconHtml = hasVegFlag
                            ? `<div class="flex items-center justify-center w-3.5 h-3.5 border ${borderIconColor} rounded-[3px] p-[1.5px] shrink-0 bg-white"><i data-lucide="${vegIconType}" class="w-full h-full ${vegIconColor}"></i></div>`
                            : '';

                        const isLast = index === subItems.length - 1;

                        const itemHtml = `
                            <div class="group relative ${!isLast ? 'mb-5 pb-5 border-b border-stone-100/80' : ''}">
                                <div class="flex items-start justify-between gap-2 sm:gap-3 w-full">
                                    <div class="flex items-start gap-2.5 flex-1 pr-1 sm:pr-2">
                                        <div class="mt-1 shrink-0">${vegIconHtml}</div>
                                        <div class="flex-1 w-full">
                                            <div class="flex items-end w-full flex-wrap sm:flex-nowrap">
                                                <!-- Removed whitespace-nowrap here to allow long names to wrap nicely on mobile -->
                                                <h4 class="${currentLang === 'mr' ? 'font-mr font-medium text-[1.1rem]' : 'font-heading font-bold text-[1.15rem]'} text-brand-dark leading-tight pr-2 break-words">${itemName}</h4>
                                                <div class="flex-1 leader-line mb-1.5 mx-2 opacity-30 group-hover:opacity-100 transition-opacity duration-300 hidden sm:block"></div>
                                            </div>
                                            ${itemDesc ? `<p class="text-[0.8rem] text-brand-muted leading-snug mt-1.5 ${currentLang === 'mr' ? 'font-mr' : 'font-body'}">${itemDesc}</p>` : ''}
                                        </div>
                                    </div>
                                    <div class="font-heading shrink-0 bg-brand-surface pl-1 z-10 flex items-center h-full">
                                        ${priceDisplay}
                                    </div>
                                </div>
                            </div>
                        `;
                        subDiv.innerHTML += itemHtml;
                    });
                    sectionDiv.appendChild(subDiv);
                });

                container.appendChild(sectionDiv);
            });

            if (!itemsFound && searchTerm !== '') {
                container.innerHTML = `
                    <div class="text-center py-12 sm:py-16 bg-white rounded-2xl shadow-sm border border-stone-100 fade-in px-4">
                        <div class="w-16 h-16 bg-stone-50 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i data-lucide="search-x" class="w-8 h-8 text-stone-300"></i>
                        </div>
                        <p class="${currentLang === 'mr' ? 'font-mr text-lg' : 'font-body text-lg'} text-stone-500">
                            ${currentLang === 'mr' ? 'काहीही आढळले नाही' : 'No items found'}
                        </p>
                        <p class="text-xs text-stone-400 mt-2">Try a different keyword</p>
                    </div>
                `;
            }

            lucide.createIcons();
        }

        // Toggle Language
        document.getElementById('langToggle').addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'mr' : 'en';

            document.getElementById('langText').innerText = currentLang === 'en' ? 'मराठी' : 'English';

            const searchInput = document.getElementById('searchInput');
            searchInput.placeholder = currentLang === 'en' ? "Search our menu..." : "पदार्थ शोधा...";

            renderCategories();
            renderMenu(searchInput.value);
        });

        // Search Logic
        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderMenu(e.target.value);
        });

        // Initialize App
        loadMenu();
        startAutoRefresh();

        // Welcome screen logic
        window.addEventListener('load', () => {
            const welcomeScreen = document.getElementById('welcome-screen');
            setTimeout(() => {
                if (welcomeScreen) {
                    welcomeScreen.classList.add('hide');
                    setTimeout(() => {
                        welcomeScreen.remove();
                    }, 800);
                }
            }, 1800);
        });
    </script>
</body>

</html>
